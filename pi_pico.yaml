esphome:
  name: kaku

rp2040:
  board: rpipicow

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "key made with wizard"

ota:
  - platform: esphome


wifi:
  ssid: "ssid"
  password: "password"

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Kaku Fallback Hotspot"# Configuration entry
    password: "password"

output:
  - platform: gpio
    pin: LED
    #default pico spi
    pin: MISO #	GPIO 16
    pin: MOSI	#	GPIO 19
    pin: SCK	# GPIO 18
    pin: SS	  #	GPIO 17
    id: cc1101
