esphome:
  name: kaku

rp2040:
  board: rpipicow

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "key made with wizard"

ota:
  - platform: esphome


wifi:
  ssid: "ssid"
  password: "password"

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "Kaku Fallback Hotspot"# Configuration entry
    password: "password"

spi:
  clk_pin: SCK
  mosi_pin: MOSI
  miso_pin: MISO

cc1101:
  cs_pin: CS
  frequency: 433.92MHz
  packet_mode: true

remote_transmitter:
  pin: GPIO20  # Must match GDO0
  carrier_duty_percent: 100%
  on_transmit:
    then:
      - cc1101.begin_tx
  on_complete:
    then:
      - cc1101.begin_rx

remote_receiver:
  pin: GPIO21  # Must match GDO2
  dump: all
